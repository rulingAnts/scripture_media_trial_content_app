name: Build macOS app (test)

# Builds the Scripture Media Player as a macOS .app for TESTING on a real Mac.
# This is intentionally NOT part of releases (no Mac distro) — manual run only.
# The .app is UNSIGNED (CI has no Developer ID), so after downloading remove the
# quarantine flag before opening:
#   xattr -dr com.apple.quarantine "Scripture Media Player.app"
#
# Run it from the Actions tab -> "Build macOS app (test)" -> Run workflow; the
# .app is uploaded as a downloadable artifact on the run page.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-latest   # Apple Silicon (arm64), matches Seth's M3 Mac
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build macOS .app
        working-directory: mobile_app
        run: |
          flutter --version
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

      - name: Zip the .app (ditto preserves the bundle)
        working-directory: mobile_app/build/macos/Build/Products/Release
        run: |
          APP="$(ls -d *.app | head -1)"
          echo "Packaging: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$GITHUB_WORKSPACE/scripture-media-player-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: scripture-media-player-macos-arm64
          path: scripture-media-player-macos-arm64.zip
