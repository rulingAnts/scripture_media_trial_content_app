name: Build Android APK (test)

# Builds a release APK for sideloading onto a device/emulator for TESTING.
# The release build is debug-signed (android/app/build.gradle.kts uses
# signingConfigs.debug), so it installs on any device/AVD without a keystore.
# Manual run only (not a release artifact) — download the .apk from the run page
# and `adb install` it.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APK (release, debug-signed, all ABIs)
        working-directory: mobile_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Determine version
        id: ver
        shell: bash
        run: |
          V="$(grep -m1 '^version:' mobile_app/pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Stage APK with a consistent name
        shell: bash
        run: |
          mkdir -p dist
          cp mobile_app/build/app/outputs/flutter-apk/app-release.apk \
             "dist/scripture-media-player_${{ steps.ver.outputs.version }}_android.apk"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: scripture-media-player_android
          path: dist/*.apk
